<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Sudoku</title>
  <link rel="stylesheet" href="04_sudoku.css">
</head>
<body>
  <h1>Sudoku</h1>
  <div id="board"></div>
  <div id="number-pad"></div>
  <div id="buttons"></div>
  <form id="new-game-panel" hidden>
    <label>
      br
      <input id="br-input" type="number" min="1" max="5" value="3">
    </label>
    <label>
      bc
      <input id="bc-input" type="number" min="1" max="5" value="3">
    </label>
    <label>
      level
      <input id="level-input" type="number" min="0" max="3" value="0">
    </label>
    <label>
      seed
      <input id="seed-input" type="number" value="42">
    </label>
    <button type="submit">New Puzzle</button>
  </form>
  <script type="module" src="04_sudoku.js" defer></script>
</body>
</html>
